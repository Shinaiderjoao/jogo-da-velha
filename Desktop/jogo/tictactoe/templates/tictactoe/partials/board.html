{% comment %} Separate board partial for cleaner layout and reusability {% endcomment %}
<div class="relative flex justify-center">
    <div class="grid grid-cols-3 gap-4" id="board-grid" style="max-width:640px;">
        {% for cell in room.board %}
            <form hx-post="/play/" hx-target="#game-shell" hx-swap="innerHTML" class="contents">
                {% csrf_token %}
                <input type="hidden" name="position" value="{{ forloop.counter0 }}">
                <button type="submit" class="board-cell w-36 h-36 md:w-44 md:h-44 rounded-2xl border border-slate-600 bg-slate-700/90 text-6xl md:text-7xl font-black text-amber-300 shadow-lg transition hover:-translate-y-0.5 hover:bg-slate-600 disabled:cursor-not-allowed disabled:opacity-80 flex items-center justify-center" data-index="{{ forloop.counter0 }}" {% if cell or room.winner or not room.started %}disabled{% endif %}>
                    {{ cell|default:"" }}
                </button>
            </form>
        {% endfor %}
    </div>

    {% if room.winning_line %}
        <svg class="absolute inset-0 pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none">
            <script>
                // replaced by parent template script if needed
            </script>
        </svg>
    {% endif %}
</div>
